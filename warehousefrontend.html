<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaDetect | Image Detection Warehouse (Single File)</title>

    <!-- Inline styles from css/main.css -->
    <style>
    :root {
        /* Color Palette */
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --secondary: #10b981;
        --accent: #f59e0b;
        --bg-dark: #0f172a;
        --bg-card: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border: #334155;
        --glass: rgba(30, 41, 59, 0.7);
        --glass-border: rgba(255, 255, 255, 0.1);

        /* Spacing & Borders */
        --radius: 12px;
        --transition: 0.3s ease;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
        background-color: var(--bg-dark);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
    }

    /* Sidebar Layout */
    .sidebar {
        width: 260px;
        height: 100vh;
        background: var(--bg-card);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 2rem 1rem;
        position: fixed;
    }

    .logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 3rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .nav-links {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .nav-item {
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--text-muted);
        font-weight: 500;
    }

    .nav-item:hover, .nav-item.active {
        background: var(--glass);
        color: var(--text-main);
    }

    .nav-item.active {
        background: var(--primary);
        color: white;
    }

    /* Main Content Area */
    .main-content {
        margin-left: 260px;
        flex: 1;
        padding: 2rem 3rem;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    header {
        margin-bottom: 2.5rem;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }

    .subtitle {
        color: var(--text-muted);
    }

    /* Glass Cards */
    .card {
        background: var(--glass);
        backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
    }

    /* Common UI Elements */
    .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: var(--radius);
        cursor: pointer;
        font-weight: 600;
        transition: var(--transition);
    }

    .btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
    }

    .btn-secondary {
        background: var(--secondary);
    }

    .btn-accent {
        background: var(--accent);
    }

    .loading-spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        display: none;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Utils */
    .flex { display: flex; }
    .justify-between { justify-content: space-between; }
    .align-center { align-items: center; }
    .gap-2 { gap: 0.5rem; }
    .gap-4 { gap: 1rem; }

    /* Inline styles from css/upload.css */
    .upload-grid {
        display: grid;
        grid-template-columns: 1fr 350px;
        gap: 2rem;
    }

    .drop-zone {
        border: 2px dashed var(--border);
        border-radius: var(--radius);
        padding: 3rem;
        text-align: center;
        transition: var(--transition);
        cursor: pointer;
        background: rgba(255,255,255,0.02);
    }

    .drop-zone:hover, .drop-zone.active {
        border-color: var(--primary);
        background: rgba(99, 102, 241, 0.05);
    }

    .drop-zone i {
        font-size: 3rem;
        color: var(--text-muted);
        margin-bottom: 1rem;
    }

    /* Pipeline Progress */
    .pipeline-steps {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        position: relative;
    }

    .pipeline-step {
        display: flex;
        align-items: center;
        gap: 1rem;
        position: relative;
        z-index: 1;
    }

    .step-indicator {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 0.8rem;
        transition: var(--transition);
    }

    .pipeline-step.active .step-indicator {
        background: var(--primary);
        box-shadow: 0 0 15px var(--primary);
    }

    .pipeline-step.completed .step-indicator {
        background: var(--secondary);
    }

    .step-info {
        flex: 1;
    }

    .step-title {
        font-weight: 600;
        font-size: 0.95rem;
    }

    .step-status {
        font-size: 0.8rem;
        color: var(--text-muted);
    }

    /* Results Section */
    .preview-container {
        position: relative;
        width: 100%;
        max-height: 500px;
        overflow: hidden;
        border-radius: var(--radius);
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 2rem;
    }

    #image-preview {
        max-width: 100%;
        max-height: 500px;
        display: block;
    }

    #detection-canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
    }

    .results-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1.5rem;
    }

    .results-table th {
        text-align: left;
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .results-table td {
        padding: 1rem;
        border-bottom: 1px solid var(--border);
    }

    .confidence-badge {
        padding: 0.25rem 0.6rem;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        background: rgba(16, 185, 129, 0.1);
        color: var(--secondary);
    }

    /* Inline styles from css/search.css */
    .search-container {
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    .filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1.5rem;
        align-items: end;
    }

    .search-field {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .search-field label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-muted);
    }

    .input-field {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.75rem 1rem;
        color: var(--text-main);
        font-size: 0.95rem;
        outline: none;
        transition: var(--transition);
    }

    .input-field:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    /* Pagination */
    .pagination {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 2rem;
    }

    .page-btn {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        color: var(--text-main);
        cursor: pointer;
        transition: var(--transition);
    }

    .page-btn:hover {
        background: var(--primary);
        border-color: var(--primary);
    }

    .page-btn.active {
        background: var(--primary);
        border-color: var(--primary);
    }

    /* Inline styles from css/analytics.css */
    .analytics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    .stat-card {
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .stat-value {
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--primary);
    }

    .stat-label {
        font-size: 0.9rem;
        color: var(--text-muted);
        font-weight: 500;
    }

    .chart-container {
        height: 300px;
        width: 100%;
        margin-top: 2rem;
        position: relative;
    }

    .chart-svg {
        width: 100%;
        height: 100%;
    }

    .bar {
        fill: var(--primary);
        rx: 4;
        transition: var(--transition);
    }

    .bar:hover {
        fill: var(--primary-hover);
    }

    .chart-axis {
        stroke: var(--border);
        stroke-width: 1;
    }

    .chart-label {
        fill: var(--text-muted);
        font-size: 10px;
        font-weight: 500;
    }
    </style>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <i data-lucide="database"></i>
            <span>MetaDetect</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item active" data-page="upload">
                <i data-lucide="upload-cloud"></i>
                <span>Upload</span>
            </li>
            <li class="nav-item" data-page="search">
                <i data-lucide="search"></i>
                <span>Search</span>
            </li>
            <li class="nav-item" data-page="analytics">
                <i data-lucide="bar-chart-3"></i>
                <span>Analytics</span>
            </li>
        </ul>
    </nav>

    <main class="main-content">
        <div id="app-container" class="container">
            <!-- Dynamic Content Injected Here -->
        </div>
    </main>

    <!-- Inline scripts from js/api.js -->
    <script>
    const API_BASE_URL = 'http://localhost:8000'; // Adjust based on FastAPI config

    const API = {
        async upload(file, isZip = false) {
            const formData = new FormData();
            formData.append('file', file);
            
            const response = await fetch(`${API_BASE_URL}/upload`, {
                method: 'POST',
                body: formData
            });
            return response.json();
        },

        async search(filters = {}) {
            const params = new URLSearchParams(filters);
            const response = await fetch(`${API_BASE_URL}/search?${params}`);
            return response.json();
        },

        async getAnalytics() {
            const response = await fetch(`${API_BASE_URL}/analytics`);
            return response.json();
        }
    };
    </script>

    <!-- Inline scripts from js/canvas.js -->
    <script>
    const Canvas = {
        draw(detections) {
            const canvas = document.getElementById('detection-canvas');
            const img = document.getElementById('image-preview');
            
            // Match canvas size to displayed image size
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            detections.forEach(det => {
                const { bbox, label, confidence } = det;
                // Assuming bbox is [x, y, w, h] in normalized coordinates (0-1)
                // If backend sends absolute pixels, we need to scale based on natural vs client size
                
                const scaleX = canvas.width;
                const scaleY = canvas.height;

                const [x, y, w, h] = bbox.map((val, i) => i % 2 === 0 ? val * scaleX : val * scaleY);

                // Draw Box
                ctx.strokeStyle = '#6366f1';
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, w, h);

                // Draw Tag
                ctx.fillStyle = '#6366f1';
                const text = `${label} ${(confidence * 100).toFixed(0)}%`;
                const textWidth = ctx.measureText(text).width;
                ctx.fillRect(x, y - 25, textWidth + 10, 25);

                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px Inter';
                ctx.fillText(text, x + 5, y - 8);
            });
        }
    };

    // Handle window resize for canvas scaling
    window.addEventListener('resize', () => {
        if (document.getElementById('detection-canvas')) {
            // Debounce if needed, but for now simple redraw
            const results = document.getElementById('processing-results');
            if (results && results.style.display !== 'none') {
                // Ideally we'd store the last results somewhere global
                // For now, it will just clear until next upload or re-init
            }
        }
    });
    </script>

    <!-- Inline scripts from js/upload.js -->
    <script>
    const UploadPage = {
        render() {
            return `
                <header>
                    <h1>Upload & Process</h1>
                    <p class="subtitle">Extract metadata using Medallion Pipeline</p>
                </header>

                <div class="upload-grid">
                    <div class="main-col">
                        <div class="card drop-zone" id="drop-zone">
                            <i data-lucide="upload-cloud"></i>
                            <h3>Drag & Drop Images</h3>
                            <p class="subtitle">Supports JPG, PNG or ZIP datasets</p>
                            <input type="file" id="file-input" hidden accept="image/*,.zip">
                            <button class="btn" style="margin-top: 1.5rem" onclick="document.getElementById('file-input').click()">
                                Browse Files
                            </button>
                        </div>

                        <div id="processing-results" style="display: none;">
                            <div class="flex justify-between align-center" style="margin-top: 2rem">
                                <h3>Detection Results</h3>
                                <div class="flex gap-4">
                                    <span>Time: <strong id="proc-time">0s</strong></span>
                                    <span>Objects: <strong id="obj-count">0</strong></span>
                                </div>
                            </div>
                            
                            <div class="preview-container">
                                <img id="image-preview" src="" alt="Preview">
                                <canvas id="detection-canvas"></canvas>
                            </div>

                            <table class="results-table">
                                <thead>
                                    <tr>
                                        <th>Object</th>
                                        <th>Confidence</th>
                                        <th>Model</th>
                                        <th>Timestamp</th>
                                    </tr>
                                </thead>
                                <tbody id="results-body">
                                    <!-- Dynamic rows -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="side-col">
                        <div class="card">
                            <h3>Pipeline Status</h3>
                            <div class="pipeline-steps" style="margin-top: 1.5rem">
                                <div class="pipeline-step" id="step-bronze">
                                    <div class="step-indicator">1</div>
                                    <div class="step-info">
                                        <div class="step-title">Bronze Layer</div>
                                        <div class="step-status">Raw Storage</div>
                                    </div>
                                </div>
                                <div class="pipeline-step" id="step-silver">
                                    <div class="step-indicator">2</div>
                                    <div class="step-info">
                                        <div class="step-title">Silver Layer</div>
                                        <div class="step-status">Cleaned Metadata</div>
                                    </div>
                                </div>
                                <div class="pipeline-step" id="step-gold">
                                    <div class="step-indicator">3</div>
                                    <div class="step-info">
                                        <div class="step-title">Gold Layer</div>
                                        <div class="step-status">Warehouse Loaded</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card" id="metadata-summary" style="display: none;">
                            <h3>File Metadata</h3>
                            <div style="margin-top: 1rem; font-size: 0.9rem;">
                                <div class="flex justify-between" style="padding: 0.5rem 0; border-bottom: 1px solid var(--border);">
                                    <span class="text-muted">Image ID</span>
                                    <span id="meta-img-id">-</span>
                                </div>
                                <div class="flex justify-between" style="padding: 0.5rem 0; border-bottom: 1px solid var(--border);">
                                    <span class="text-muted">Batch ID</span>
                                    <span id="meta-batch-id">-</span>
                                </div>
                                <div class="flex justify-between" style="padding: 0.5rem 0;">
                                    <span class="text-muted">Model</span>
                                    <span id="meta-model">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        },

        init() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('active');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('active');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('active');
                const file = e.dataTransfer.files[0];
                if (file) this.handleUpload(file);
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) this.handleUpload(file);
            });
        },

        async handleUpload(file) {
            document.getElementById('processing-results').style.display = 'none';
            document.getElementById('metadata-summary').style.display = 'none';
            this.resetPipeline();

            try {
                // Step 1: Bronze
                this.updateStep('bronze', 'active');
                
                // Artificial delay to show progress
                await new Promise(r => setTimeout(r, 800));
                this.updateStep('bronze', 'completed');
                this.updateStep('silver', 'active');

                const result = await API.upload(file);
                
                // Step 2: Silver
                await new Promise(r => setTimeout(r, 800));
                this.updateStep('silver', 'completed');
                this.updateStep('gold', 'active');

                // Step 3: Gold
                await new Promise(r => setTimeout(r, 800));
                this.updateStep('gold', 'completed');

                this.displayResults(result, file);
            } catch (error) {
                console.error('Upload failed:', error);
                alert('Processing failed. Please ensure backend is running.');
                this.resetPipeline();
            }
        },

        updateStep(id, status) {
            const el = document.getElementById(`step-${id}`);
            el.classList.remove('active', 'completed');
            if (status) el.classList.add(status);
        },

        resetPipeline() {
            ['bronze', 'silver', 'gold'].forEach(id => {
                const el = document.getElementById(`step-${id}`);
                el.classList.remove('active', 'completed');
            });
        },

        displayResults(data, file) {
            document.getElementById('processing-results').style.display = 'block';
            document.getElementById('metadata-summary').style.display = 'block';
            
            // Stats
            document.getElementById('proc-time').innerText = data.processing_time || '1.2s';
            document.getElementById('obj-count').innerText = data.detections.length;

            // Meta
            document.getElementById('meta-img-id').innerText = data.image_id || 'IMG_772';
            document.getElementById('meta-batch-id').innerText = data.batch_id || 'BATCH_001';
            document.getElementById('meta-model').innerText = data.model_version || 'YOLOv8-Fast';

            // Table
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = data.detections.map(d => `
                <tr>
                    <td><strong>${d.label}</strong></td>
                    <td><span class="confidence-badge">${(d.confidence * 100).toFixed(1)}%</span></td>
                    <td>${data.model_version || 'Detecto-1'}</td>
                    <td>${new Date().toLocaleTimeString()}</td>
                </tr>
            `).join('');

            // Preview & Canvas
            const img = document.getElementById('image-preview');
            const reader = new FileReader();
            reader.onload = (e) => {
                img.src = e.target.result;
                img.onload = () => {
                    Canvas.draw(data.detections);
                };
            };
            reader.readAsDataURL(file);
        }
    };
    </script>

    <!-- Inline scripts from js/search.js -->
    <script>
    const SearchPage = {
        render() {
            return `
                <header>
                    <h1>Search Warehouse</h1>
                    <p class="subtitle">Query the Golden Layer using Star Schema metadata</p>
                </header>

                <div class="search-container">
                    <div class="card">
                        <div class="filter-grid" id="search-filters">
                            <div class="search-field">
                                <label>Object Name</label>
                                <input type="text" class="input-field" placeholder="e.g. Person, Car" id="filter-object">
                            </div>
                            <div class="search-field">
                                <label>Min Confidence</label>
                                <input type="number" class="input-field" step="0.1" min="0" max="1" value="0.5" id="filter-confidence">
                            </div>
                            <div class="search-field">
                                <label>Model Version</label>
                                <select class="input-field" id="filter-model">
                                    <option value="">All Models</option>
                                    <option value="yolo-v8">YOLOv8-Fast</option>
                                    <option value="ssd-mobile">SSD-MobileNet</option>
                                    <option value="detecto-1">Detecto-1</option>
                                </select>
                            </div>
                            <div class="search-field">
                                <label>Batch ID</label>
                                <input type="text" class="input-field" placeholder="BATCH_001" id="filter-batch">
                            </div>
                            <button class="btn" id="search-btn">
                                <i data-lucide="search" style="vertical-align: middle; margin-right: 0.5rem"></i>
                                Query
                            </button>
                        </div>
                    </div>

                    <div class="card" style="padding: 0;">
                        <table class="results-table">
                            <thead>
                                <tr>
                                    <th>Image ID</th>
                                    <th>Object</th>
                                    <th>Confidence</th>
                                    <th>Date</th>
                                    <th>Batch</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="search-results-tbody">
                                <!-- Results will be injected here -->
                            </tbody>
                        </table>
                        
                        <div class="pagination" id="pagination">
                            <!-- Pagination buttons -->
                        </div>
                    </div>
                </div>
            `;
        },

        init() {
            const searchBtn = document.getElementById('search-btn');
            searchBtn.addEventListener('click', () => this.performSearch());

            // Trigger initial search
            this.performSearch();
        },

        async performSearch(page = 1) {
            const filters = {
                object: document.getElementById('filter-object').value,
                confidence: document.getElementById('filter-confidence').value,
                model: document.getElementById('filter-model').value,
                batch: document.getElementById('filter-batch').value,
                page: page
            };

            const tbody = document.getElementById('search-results-tbody');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">Searching...</td></tr>';

            try {
                const data = await API.search(filters);
                this.displayResults(data || this.getMockResults());
            } catch (error) {
                console.error('Search failed:', error);
                // Fallback to mock for demo
                this.displayResults(this.getMockResults());
            }
        },

        displayResults(data) {
            const tbody = document.getElementById('search-results-tbody');
            tbody.innerHTML = data.items.map(item => `
                <tr>
                    <td><strong>${item.image_id}</strong></td>
                    <td>${item.label}</td>
                    <td><span class="confidence-badge">${(item.confidence * 100).toFixed(1)}%</span></td>
                    <td>${new Date(item.timestamp).toLocaleDateString()}</td>
                    <td><code style="color: var(--text-muted)">${item.batch_id}</code></td>
                    <td>
                        <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem">View</button>
                    </td>
                </tr>
            `).join('');

            this.renderPagination(data.total_pages, data.current_page);
        },

        renderPagination(total, current) {
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            
            for (let i = 1; i <= Math.min(total, 5); i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === current ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => this.performSearch(i);
                container.appendChild(btn);
            }
        },

        getMockResults() {
            return {
                items: [
                    { image_id: 'IMG_001', label: 'Person', confidence: 0.98, timestamp: '2024-03-05T10:00:00', batch_id: 'BATCH_A' },
                    { image_id: 'IMG_002', label: 'Car', confidence: 0.85, timestamp: '2024-03-05T11:00:00', batch_id: 'BATCH_A' },
                    { image_id: 'IMG_003', label: 'Dog', confidence: 0.92, timestamp: '2024-03-05T12:00:00', batch_id: 'BATCH_B' },
                    { image_id: 'IMG_004', label: 'Tree', confidence: 0.78, timestamp: '2024-03-05T13:00:00', batch_id: 'BATCH_B' },
                    { image_id: 'IMG_005', label: 'Person', confidence: 0.95, timestamp: '2024-03-05T14:00:00', batch_id: 'BATCH_C' },
                ],
                total_pages: 3,
                current_page: 1
            };
        }
    };
    </script>

    <!-- Inline scripts from js/analytics.js -->
    <script>
    const AnalyticsPage = {
        render() {
            return `
                <header>
                    <h1>System Analytics</h1>
                    <p class="subtitle">Real-time insights from the Metadata Warehouse</p>
                </header>

                <div class="analytics-grid">
                    <div class="card stat-card">
                        <span class="stat-label">Total Images</span>
                        <span class="stat-value" id="stat-images">0</span>
                    </div>
                    <div class="card stat-card">
                        <span class="stat-label">Total Detections</span>
                        <span class="stat-value" id="stat-detections">0</span>
                    </div>
                    <div class="card stat-card">
                        <span class="stat-label">Avg. Confidence</span>
                        <span class="stat-value" id="stat-confidence">0%</span>
                    </div>
                    <div class="card stat-card">
                        <span class="stat-label">Uptime</span>
                        <span class="stat-value" id="stat-uptime">99.9%</span>
                    </div>
                </div>

                <div class="card">
                    <h3>Detection Trends (Top Objects)</h3>
                    <div class="chart-container" id="chart-mount">
                        <svg class="chart-svg" id="detection-chart" viewBox="0 0 800 300">
                            <!-- Bars and labels will be injected here -->
                        </svg>
                    </div>
                </div>

                <div class="card" style="margin-top: 2rem">
                    <h3>Most Detected Object</h3>
                    <div class="flex align-center gap-4" style="margin-top: 1rem">
                        <div class="stat-value" id="stat-top-obj" style="font-size: 3rem">Person</div>
                        <div style="color: var(--text-muted)">Accounting for 42% of total detections across all batches.</div>
                    </div>
                </div>
            `;
        },

        async init() {
            try {
                const data = await API.getAnalytics();
                this.updateDashboard(data || this.getMockData());
            } catch (error) {
                console.error('Analytics failed:', error);
                this.updateDashboard(this.getMockData());
            }
        },

        updateDashboard(data) {
            document.getElementById('stat-images').innerText = data.total_images;
            document.getElementById('stat-detections').innerText = data.total_detections;
            document.getElementById('stat-confidence').innerText = `${(data.avg_confidence * 100).toFixed(1)}%`;
            document.getElementById('stat-top-obj').innerText = data.top_object;

            this.renderChart(data.top_counts);
        },

        renderChart(counts) {
            const svg = document.getElementById('detection-chart');
            const labels = Object.keys(counts);
            const values = Object.values(counts);
            const maxVal = Math.max(...values);
            
            const padding = 40;
            const chartWidth = 720; // 800 - padding*2
            const chartHeight = 220; // 300 - padding*2
            const barWidth = (chartWidth / labels.length) - 20;

            let chartHtml = `
                <!-- Y-Axis -->
                <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${chartHeight + padding}" class="chart-axis" />
                <!-- X-Axis -->
                <line x1="${padding}" y1="${chartHeight + padding}" x2="${chartWidth + padding}" y2="${chartHeight + padding}" class="chart-axis" />
            `;

            labels.forEach((label, i) => {
                const x = padding + 10 + i * (barWidth + 20);
                const val = values[i];
                const h = (val / maxVal) * chartHeight;
                const y = chartHeight + padding - h;

                chartHtml += `
                    <rect x="${x}" y="${y}" width="${barWidth}" height="${h}" class="bar">
                        <title>${label}: ${val}</title>
                    </rect>
                    <text x="${x + barWidth / 2}" y="${chartHeight + padding + 20}" text-anchor="middle" class="chart-label">${label}</text>
                    <text x="${x + barWidth / 2}" y="${y - 10}" text-anchor="middle" class="chart-label" style="fill: var(--text-main)">${val}</text>
                `;
            });

            svg.innerHTML = chartHtml;
        },

        getMockData() {
            return {
                total_images: 1284,
                total_detections: 5621,
                avg_confidence: 0.892,
                top_object: 'Person',
                top_counts: {
                    'Person': 2400,
                    'Car': 1800,
                    'Dog': 600,
                    'Tree': 450,
                    'Laptop': 371
                }
            };
        }
    };
    </script>

    <!-- Inline main app script from js/app.js -->
    <script>
    const App = {
        init() {
            this.container = document.getElementById('app-container');
            this.navItems = document.querySelectorAll('.nav-item');
            
            this.navItems.forEach(item => {
                item.addEventListener('click', () => {
                    this.navigateTo(item.dataset.page);
                });
            });

            // Default route
            this.navigateTo('upload');
        },

        navigateTo(page) {
            // Update Nav UI
            this.navItems.forEach(item => {
                item.classList.toggle('active', item.dataset.page === page);
            });

            // Load Page Content
            this.renderPage(page);
        },

        async renderPage(page) {
            this.container.innerHTML = '<div class="loading-container">Loading...</div>';
            
            switch(page) {
                case 'upload':
                    this.container.innerHTML = UploadPage.render();
                    UploadPage.init();
                    break;
                case 'search':
                    this.container.innerHTML = SearchPage.render();
                    SearchPage.init();
                    break;
                case 'analytics':
                    this.container.innerHTML = AnalyticsPage.render();
                    AnalyticsPage.init();
                    break;
            }
            
            // Re-initialize icons for new content
            lucide.createIcons();
        }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());

    // Initialize Lucide Icons on initial load
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
    </script>
</body>
</html>
